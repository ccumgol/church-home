# Configuration of Hugo
# Guide: https://docs.hugoblox.com/tutorial/
# Hugo Documentation: https://gohugo.io/getting-started/configuration/#all-configuration-settings
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Website name (set in params.yaml under hugoblox.branding.name)
title: '샘플교회'
baseURL: 'https://ccumgol.github.io/church-home/' # Website URL

############################
## PAGE OPTIONS
############################

cascade:
  - target:
      path: /**
    params:
      show_date: false
      reading_time: false
  # Blog post options
  - target:
      path: /blog/**
      kind: page
    params:
      pager: true
      editable: true
      show_date: true
      show_date_updated: true
      reading_time: true
      commentable: true
      show_related: true
      share: true
      show_breadcrumb: false
      header:
        navbar:
          enable: true
  # Blog section options
  - target:
      path: /blog/*
      kind: section
    params:
      view: date-title-summary

############################
## LANGUAGE
############################

defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

############################
## ADVANCED
############################

build:
  writeStats: true
enableGitInfo: false
summaryLength: 30
pagination:
  pagerSize: 10
enableEmoji: true
enableRobotsTXT: true
ignoreFiles: [".ipynb_checkpoints$", "\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
disableAliases: true
outputs:
  home: [HTML, RSS, headers, redirects]
  section: [HTML, RSS]
imaging:
  resampleFilter: Lanczos
  quality: 90
  anchor: Smart
  hint: picture
timeout: '600s'
taxonomies:
  tag: tags
  category: categories
  author: authors
markup:
  _merge: deep
  goldmark:
    renderer:
      unsafe: true
  highlight:
    lineNos: false
security:
  _merge: deep
sitemap:
  _merge: deep
